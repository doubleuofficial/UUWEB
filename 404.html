<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drifted Away | DoubleU Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;900&display=swap');
        
        :root { --neon-orange: #ff6b00; --charcoal: #050505; }
        
        body { 
            background-color: var(--charcoal); 
            color: #f4f4f5; 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ethereal Background Glows */
        .drift-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(255, 107, 0, 0.05), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.03), transparent 40%);
            filter: blur(60px);
            animation: drift-bg 20s infinite alternate;
        }

        @keyframes drift-bg {
            from { transform: scale(1); }
            to { transform: scale(1.2) translate(20px, 10px); }
        }

        .brand-font { font-family: 'Syncopate', sans-serif; }
        
        /* The "Fading" 404 */
        .error-code {
            font-size: 12rem;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.08em;
            opacity: 0.1;
            background: linear-gradient(to bottom, #fff, transparent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: blur(2px);
            animation: pulse-fade 6s infinite ease-in-out;
        }

        @keyframes pulse-fade {
            0%, 100% { opacity: 0.05; filter: blur(4px); }
            50% { opacity: 0.15; filter: blur(1px); }
        }

        /* Floating Text Content */
        .content-layer {
            position: absolute;
            z-index: 10;
            text-align: center;
        }

        .drift-text {
            animation: float 5s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .btn-ghost {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-ghost:hover {
            border-color: var(--neon-orange);
            background: rgba(255, 107, 0, 0.05);
            letter-spacing: 0.5em;
            color: var(--neon-orange);
        }

        /* Scanline Overlay for "Faded" Look */
        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.1;
            z-index: 20;
        }
    </style>
</head>
<body class="antialiased">

    <div class="drift-bg"></div>
    <div class="scanline"></div>

    <div class="error-code brand-font select-none">404</div>

    <div class="content-layer px-6">
        <div class="drift-text">
            <h1 class="brand-font text-2xl md:text-4xl italic uppercase tracking-tighter mb-4 opacity-90">
                DRFTD <span class="text-[#ff6b00]">THOUGHTS</span>
            </h1>
            
            <p class="text-zinc-500 text-[9px] font-black uppercase tracking-[0.6em] mb-12 max-w-xs mx-auto leading-loose opacity-60">
                You've wandered outside the atmosphere. This thought is gone.
            </p>

            <a href="/" class="btn-ghost px-12 py-5 rounded-full text-[9px] font-black uppercase tracking-[0.3em] inline-block">
                Return to Reality
            </a>
        </div>
        
        <div class="mt-24 opacity-10">
            <p class="text-[8px] tracking-[1em] uppercase font-bold">Lost in the 405</p>
        </div>
    </div>

</body>
</html>
