    {
      "@context": "https://schema.org",
      "@type": "MusicGroup",

      "alternateName": ["DoubleU OTB", "William Hartman"],

      "logo": "www.https://doubleuofficial.online/assets/images/icon-512.png",
      "image": "www.https://doubleuofficial.online/assets/images/og-share.jpg",
      "description": "DoubleU is a music artist, singer-songwriter, and producer based in Oklahoma City, specializing in Cinematic Pain Music and Soul Trap.",
      "genre": ["Cinematic Pain Music", "Soul Trap", "Hip Hop"],
      "location": {

        "name": "Oklahoma City, OK"
      },
      "sameAs": [
        "https://open.spotify.com/artist/78gVqbaxxYAd9aLEZJ49YG",
        "https://music.apple.com/us/artist/doubleu/1586705800",
        "https://www.youtube.com/@DoubleUOTB"
      ]
    }
    </script>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff6b00">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        :root { --neon-orange: #ff6b00; --charcoal: #0a0a0a; }
        body { background: var(--charcoal); color: #f4f4f5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .brand-font { font-family: 'Syncopate', sans-serif; }
        .neon-text { color: var(--neon-orange); text-shadow: 0 0 15px rgba(255,107,0,0.4); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #hero-bg { background: linear-gradient(to bottom, rgba(10, 10, 10, 0.4), var(--charcoal)), url('/assets/single/red-dirt-lights.webp') center/cover fixed; }
        .btn-hover:hover { background: var(--neon-orange); color: white; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 107, 0, 0.4); }
    </style>
</head>
<body class="antialiased">
    <div id="nav-placeholder"></div>

    <header id="hero-bg" class="relative min-h-screen flex items-center justify-center text-center px-6">
        <div class="relative z-10 max-w-5xl">
            <span class="neon-text text-[9px] font-black tracking-[0.9em] uppercase mb-6 block animate-pulse">New Single Available Now</span>
            <h1 class="brand-font text-6xl md:text-9xl italic uppercase mb-10 leading-none tracking-tighter">
                Red Dirt <br> <span class="neon-text">Lights</span>
            </h1>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                <a href="/single/red-dirt-lights" class="px-12 py-5 bg-white text-black font-black uppercase text-[11px] tracking-[0.3em] rounded-full btn-hover transition-all">Stream Project</a>
                <a href="/music" class="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-400 hover:text-white transition">View Vault <i class="fa-solid fa-arrow-right ml-2"></i></a>
            </div>
        </div>
    </header>

    <section class="py-32 max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row items-end justify-between mb-20 gap-4">
            <div>
                <h2 class="brand-font text-3xl italic uppercase leading-none">The <span class="neon-text">Discography</span></h2>
                <p class="text-zinc-600 text-[10px] uppercase tracking-[0.4em] mt-4 font-bold">Atmosphere of the 405</p>
            </div>
            <a href="/music" class="text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-orange-500 transition border-b border-zinc-800 pb-1">Full Vault</a>
        </div>
        
        <div id="featured-grid" class="grid grid-cols-2 md:grid-cols-4 gap-8 md:gap-12 text-center">
            </div>
    </section>

    <section id="contact" class="py-40 max-w-3xl mx-auto px-6">
        <div class="glass p-12 md:p-20 rounded-[4rem] relative shadow-2xl">
            <div class="text-center mb-16">
                <h2 class="brand-font text-4xl italic mb-4 uppercase tracking-tighter">Direct <span class="neon-text">Inquiry</span></h2>
                <p class="text-zinc-500 text-[9px] font-black uppercase tracking-[0.6em]">Management & Booking Only</p>
            </div>
            
            <form action="https://formsubmit.co/reach@doubleuofficial.online" method="POST" class="space-y-6">
                <input type="hidden" name="_subject" value="New Website Inquiry - DoubleU Official">
                <input type="hidden" name="_next" value="https://doubleuofficial.online/contact">
                
                <div class="grid md:grid-cols-2 gap-6">
                    <input type="text" name="name" placeholder="NAME" required class="w-full p-6 bg-white/5 border border-white/10 rounded-3xl outline-none focus:border-orange-500 transition text-white text-xs font-bold tracking-widest">
                    <input type="email" name="email" placeholder="EMAIL" required class="w-full p-6 bg-white/5 border border-white/10 rounded-3xl outline-none focus:border-orange-500 transition text-white text-xs font-bold tracking-widest">
                </div>
                <textarea name="message" rows="5" placeholder="MESSAGE" required class="w-full p-6 bg-white/5 border border-white/10 rounded-3xl outline-none focus:border-orange-500 transition text-white text-xs font-bold tracking-widest"></textarea>
                <button type="submit" class="w-full py-6 bg-white text-black font-black uppercase text-[11px] tracking-[0.4em] rounded-3xl btn-hover transition-all">Submit Request</button>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        async function loadSite() {
            // Load Components
            const [nav, foot] = await Promise.all([
                fetch('/navbar').then(res => res.text()),
                fetch('/footer').then(res => res.text())
            ]);
            document.getElementById('nav-placeholder').innerHTML = nav;
            document.getElementById('footer-placeholder').innerHTML = foot;

            // Load & Randomize Featured Releases
            try {
                const musicRes = await fetch('/music.json');
                const musicData = await musicRes.json();
                const featured = musicData
                    .filter(m => m.title !== "Red Dirt Lights")
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 4);
                
                const grid = document.getElementById('featured-grid');
                grid.innerHTML = featured.map(item => `
                    <a href="${item.site_path}" class="group block">
                        <div class="relative overflow-hidden rounded-[2.5rem] aspect-square mb-6 border border-white/5 bg-zinc-900 shadow-xl">
                            <img src="${item.image_path}" alt="DoubleU - ${item.title}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700 scale-110 group-hover:scale-100">
                        </div>
                        <h4 class="brand-font text-[10px] uppercase italic tracking-tighter truncate">${item.title}</h4>
                        <p class="text-[8px] text-zinc-600 font-black uppercase tracking-widest mt-2">${item.type}</p>
                    </a>
                `).join('');
            } catch (err) { console.error("Music load error:", err); }
        }
        loadSite();
    </script>
</body>
</html>
