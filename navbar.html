<script>
    // NOTE: If this component is injected asynchronously via .innerHTML, 
    // move this tracking logic directly into your main template's init() function.
    (function() {
        const menu = document.getElementById('mobile-menu');
        const openBtn = document.getElementById('menu-open');
        const closeBtn = document.getElementById('menu-close');
        const links = document.querySelectorAll('.mobile-link');

        const toggleMenu = (isOpen) => {
            if (!menu) return;
            if (isOpen) {
                menu.classList.remove('translate-x-full');
                document.body.style.overflow = 'hidden';
            } else {
                menu.classList.add('translate-x-full');
                document.body.style.overflow = '';
            }
        };

        if (openBtn && closeBtn) {
            openBtn.onclick = () => toggleMenu(true);
            closeBtn.onclick = () => toggleMenu(false);
        }

        links.forEach(link => {
            link.onclick = () => toggleMenu(false);
        });
    })();
</script>
