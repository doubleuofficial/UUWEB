<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | DoubleU</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff6b00">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0a0a0a; color: #f4f4f5; font-family: 'Inter', sans-serif; }
        .brand-font { font-family: 'Syncopate', sans-serif; }
        .neon-text { color: #ff6b00; text-shadow: 0 0 15px rgba(255,107,0,0.4); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; }
        .glass-card:hover { border-color: #ff6b00; transform: translateY(-5px); }
    </style>
</head>
<body class="antialiased">
    <div id="nav-placeholder"></div>

    <header class="pt-48 pb-20 text-center px-6">
        <div class="inline-block">
            <h1 class="brand-font text-5xl md:text-7xl italic uppercase tracking-tighter">
                <span class="text-orange-500">Double</span>U
            </h1>
            <div class="h-1 w-full bg-gradient-to-r from-transparent via-orange-500 to-transparent mt-4 opacity-50"></div>
        </div>
        <p class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.6em] mt-8">Official Discography</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-32">
            <h2 class="brand-font text-xs text-zinc-500 uppercase tracking-[0.4em] mb-16 border-b border-white/5 pb-4">Albums</h2>
            <div id="albums-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
        </div>

        <div>
            <h2 class="brand-font text-xs text-zinc-500 uppercase tracking-[0.4em] mb-16 border-b border-white/5 pb-4">Singles</h2>
            <div id="singles-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
        </div>
    </main>
<div id="footer-placeholder"></div>
    <script>
        fetch('/navbar').then(res => res.text()).then(html => { document.getElementById('nav-placeholder').innerHTML = html; });
        async function loadVault() {
            const res = await fetch('/music.json');
            const data = await res.json();
            
            document.getElementById('albums-grid').innerHTML = data.filter(m => m.type === "Album").map(a => `
                <a href="${a.site_path}" class="glass-card p-6 rounded-[3rem] block group">
                    <img src="${a.image_path}" class="w-full aspect-square rounded-[2rem] mb-8 grayscale group-hover:grayscale-0 transition duration-700 object-cover">
                    <h3 class="brand-font text-xl uppercase italic tracking-tighter">${a.title}</h3>
                </a>`).join('');

            document.getElementById('singles-grid').innerHTML = data.filter(m => m.type === "Single").map(s => `
                <a href="${s.site_path}" class="group block text-center">
                    <div class="relative overflow-hidden rounded-2xl aspect-square mb-4 border border-white/5 bg-zinc-900">
                        <img src="${s.image_path}" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition duration-700">
                    </div>
                    <h4 class="text-[10px] font-black uppercase tracking-widest truncate">${s.title}</h4>
                </a>`).join('');
        }
        loadVault();
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); }); }
	// Fetch Global Footer
fetch('/footer').then(res => res.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
});
    </script>
</body>
</html>
