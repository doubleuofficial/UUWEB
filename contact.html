<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background: #121212; color: #f4f4f5; font-family: 'Inter', sans-serif; }
        .brand-font { font-family: 'Syncopate', sans-serif; }
        .neon-text { color: #ff6b00; text-shadow: 0 0 10px rgba(255,107,0,0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="min-h-screen flex items-center justify-center p-6 pt-32">
        <div class="max-w-2xl w-full">
            <div class="text-center mb-12">
                <h1 class="brand-font text-4xl md:text-5xl italic uppercase mb-4">Direct <span class="neon-text">Inquiry</span></h1>
                <p class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.4em]">Booking • Features • Media</p>
            </div>

            <div class="glass p-8 md:p-12 rounded-[3rem] border border-white/5 shadow-2xl">
                <form action="https://formsubmit.co/reach@doubleuofficial.online" method="POST" class="space-y-6">
                    <div>
                        <label class="text-[9px] font-black uppercase tracking-widest text-zinc-500 ml-4 mb-2 block">Your Name</label>
                        <input type="text" name="name" required class="w-full p-5 bg-black/40 border border-white/10 rounded-2xl outline-none focus:border-orange-500 transition text-white">
                    </div>

                    <div>
                        <label class="text-[9px] font-black uppercase tracking-widest text-zinc-500 ml-4 mb-2 block">Email Address</label>
                        <input type="email" name="email" required class="w-full p-5 bg-black/40 border border-white/10 rounded-2xl outline-none focus:border-orange-500 transition text-white">
                    </div>

                    <div>
                        <label class="text-[9px] font-black uppercase tracking-widest text-zinc-500 ml-4 mb-2 block">Message</label>
                        <textarea name="message" rows="5" required class="w-full p-5 bg-black/40 border border-white/10 rounded-2xl outline-none focus:border-orange-500 transition text-white"></textarea>
                    </div>

                    <button type="submit" class="w-full py-5 bg-white text-black font-black uppercase text-xs tracking-[0.2em] rounded-2xl hover:bg-orange-500 hover:text-white transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                        Send Message
                    </button>
                </form>
            </div>

            <div class="mt-12 flex justify-center space-x-8 text-zinc-500">
                <a href="https://music.apple.com/us/artist/doubleu/1586705800" class="hover:text-white transition"><i class="fa-brands fa-apple text-xl"></i></a>
                <a href="https://open.spotify.com/artist/78gVqbaxxYAd9aLEZJ49YG" class="hover:text-white transition"><i class="fa-brands fa-spotify text-xl"></i></a>
                <a href="https://www.youtube.com/@DoubleUOTB" class="hover:text-white transition"><i class="fa-brands fa-youtube text-xl"></i></a>
            </div>
        </div>
    </main>
<div id="footer-placeholder"></div>
    <script>
        fetch('/navbar.html').then(res => res.text()).then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
        });
 	// Fetch Global Footer
fetch('/footer').then(res => res.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
});  
 </script>
</body>
</html>
