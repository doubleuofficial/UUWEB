
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Author | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .brand-font { font-family: 'Syncopate', sans-serif; }
        .neon-orange-text { color: #ff6b00; text-shadow: 0 0 15px rgba(255, 107, 0, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>
    <main class="flex items-center justify-center min-h-screen p-6 pt-32 pb-20 text-center">
        <div class="max-w-xl w-full">
            <img src="/assets/album/dear-author.webp" class="w-full aspect-square rounded-[2.5rem] shadow-2xl mb-10 border border-white/5 object-cover">
            <h1 class="brand-font text-3xl md:text-5xl uppercase italic mb-2 leading-none">Dear Author</h1>
            <p class="text-orange-500 font-black tracking-[0.4em] uppercase text-[10px] mb-10">Album Track</p>
            
            <div class="grid grid-cols-1 gap-3">
                <a href="https://open.spotify.com/album/4nV9MYZCM5ym8ckHq4Gvdf?si=gJwPlh3TQUqiNIhIw3ZasA" class="flex items-center justify-between p-5 glass rounded-2xl hover:bg-[#1DB954] hover:text-black transition">
                    <span class="font-black uppercase text-xs tracking-widest">Spotify</span>
                    <i class="fa-brands fa-spotify text-xl"></i>
                </a>
                <a href="#" class="flex items-center justify-between p-5 glass rounded-2xl hover:bg-white hover:text-black transition">
                    <span class="font-black uppercase text-xs tracking-widest">Apple Music</span>
                    <i class="fa-brands fa-apple text-xl"></i>
                </a>
                <a href="https://youtube.com/playlist?list=OLAK5uy_mxkGSFfMRZOuWyCXfR56aUMv46cmZfzZQ" class="flex items-center justify-between p-5 glass rounded-2xl hover:bg-[#FF0000] transition">
                    <span class="font-black uppercase text-xs tracking-widest">YouTube</span>
                    <i class="fa-brands fa-youtube text-xl"></i>
                </a>
            </div>
            <a href="/dear-author/index.html" class="inline-block mt-10 text-zinc-600 hover:text-white uppercase text-[10px] font-black tracking-[0.5em]">← Back</a>
        </div>
    </main>
    <script>
        fetch('/navbar.html').then(res => res.text()).then(html => { document.getElementById('nav-placeholder').innerHTML = html; });
    </script>
</body>
</html>
