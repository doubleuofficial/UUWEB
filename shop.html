<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Supply | DoubleU Official</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff6b00">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root { --neon-orange: #ff6b00; --charcoal: #050505; }
        
        body { 
            background-color: var(--charcoal); 
            color: #f4f4f5; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        .brand-font { font-family: 'Syncopate', sans-serif; }
        .neon-text { color: var(--neon-orange); text-shadow: 0 0 20px rgba(255,107,0,0.5); }
        
        /* High-End Background */
        .shop-bg {
            background: radial-gradient(circle at 50% -20%, rgba(255, 107, 0, 0.15), transparent 50%),
                        linear-gradient(to bottom, transparent, var(--charcoal) 80%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* Glassmorphism Card */
        .supply-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .supply-card:hover {
            border-color: rgba(255, 107, 0, 0.3);
            background: rgba(255, 107, 0, 0.02);
            transform: translateY(-10px);
        }

        /* Shimmer Animation for Locked Items */
        .shimmer-sweep {
            position: relative;
            overflow: hidden;
        }
        .shimmer-sweep::after {
            content: '';
            position: absolute;
            top: -150%; left: -150%;
            width: 300%; height: 300%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: sweep 4s infinite linear;
        }
        @keyframes sweep {
            0% { transform: translate(-30%, -30%) rotate(45deg); }
            100% { transform: translate(30%, 30%) rotate(45deg); }
        }

        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.4);
        }
    </style>
</head>
<body class="antialiased">

    <div class="shop-bg"></div>
    <div id="nav-placeholder"></div>

    <main class="relative z-10 pt-48 pb-32 px-6">
        <div class="max-w-6xl mx-auto">
            
            <div class="text-center mb-24">
                <h2 class="neon-text text-[10px] font-black tracking-[1em] uppercase mb-6 animate-pulse">Inventory Status: Pending</h2>
                <h1 class="brand-font text-6xl md:text-[9rem] italic uppercase mb-8 tracking-tighter leading-none">
                    THE <br> <span class="text-white opacity-90">SUPPLY</span>
                </h1>
                <p class="text-zinc-500 text-[10px] md:text-xs font-black uppercase tracking-[0.6em] max-w-2xl mx-auto leading-loose">
                    Curated apparel & physical archives. Engineered in the 405. 
                    Designed for the atmosphere.
                </p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-32">
                
                <div class="supply-card shimmer-sweep rounded-[3rem] p-4 aspect-[4/5] flex flex-col group">
                    <div class="flex-grow flex items-center justify-center relative">
                        <span class="absolute top-6 left-6 text-[8px] font-bold text-zinc-700 tracking-widest uppercase">Item #001-A</span>
                        <i class="fa-solid fa-lock text-4xl text-zinc-800 group-hover:text-orange-500/40 transition-colors duration-700"></i>
                    </div>
                    <div class="p-6 border-t border-white/5">
                        <div class="h-3 w-32 bg-zinc-900 rounded-full mb-3"></div>
                        <div class="h-2 w-16 bg-zinc-900/50 rounded-full"></div>
                    </div>
                </div>

                <div class="supply-card shimmer-sweep rounded-[3rem] p-4 aspect-[4/5] flex flex-col group border-orange-500/20">
                    <div class="flex-grow flex items-center justify-center relative">
                        <span class="absolute top-6 left-6 text-[8px] font-bold text-zinc-700 tracking-widest uppercase">Item #002-B</span>
                        <i class="fa-solid fa-lock text-4xl text-zinc-800 group-hover:text-orange-500/40 transition-colors duration-700"></i>
                    </div>
                    <div class="p-6 border-t border-white/5">
                        <div class="h-3 w-40 bg-zinc-900 rounded-full mb-3"></div>
                        <div class="h-2 w-20 bg-zinc-900/50 rounded-full"></div>
                    </div>
                </div>

                <div class="supply-card shimmer-sweep rounded-[3rem] p-4 aspect-[4/5] flex flex-col group">
                    <div class="flex-grow flex items-center justify-center relative">
                        <span class="absolute top-6 left-6 text-[8px] font-bold text-zinc-700 tracking-widest uppercase">Item #003-C</span>
                        <i class="fa-solid fa-lock text-4xl text-zinc-800 group-hover:text-orange-500/40 transition-colors duration-700"></i>
                    </div>
                    <div class="p-6 border-t border-white/5">
                        <div class="h-3 w-24 bg-zinc-900 rounded-full mb-3"></div>
                        <div class="h-2 w-12 bg-zinc-900/50 rounded-full"></div>
                    </div>
                </div>

            </div>

            <div class="max-w-3xl mx-auto relative">
                <div class="absolute -inset-1 bg-gradient-to-r from-orange-600/20 to-transparent rounded-[4rem] blur-xl"></div>
                <div class="relative bg-[#0d0d0d] border border-white/5 rounded-[4rem] p-12 md:p-20 text-center shadow-2xl">
                    <h3 class="brand-font text-2xl italic uppercase mb-4 tracking-tighter">Secure <span class="neon-text">Access</span></h3>
                    <p class="text-zinc-500 text-[9px] font-black uppercase tracking-[0.5em] mb-10">Drops are limited. Be the first to know.</p>
                    
                    <form action="https://formsubmit.co/reach@doubleuofficial.online" method="POST" class="flex flex-col md:flex-row gap-4">
                        <input type="email" name="email" placeholder="IDENTITY@EMAIL.COM" required 
                               class="flex-grow p-6 bg-black border border-white/10 rounded-3xl outline-none focus:border-orange-500 transition text-white text-[10px] font-bold tracking-[0.3em]">
                        <button type="submit" 
                                class="px-12 py-6 bg-white text-black font-black uppercase text-[10px] tracking-[0.4em] rounded-3xl btn-glow transition-all duration-300 active:scale-95">
                            Join Waitlist
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Same fetch logic as before
        const loadComponents = async () => {
            const nav = await fetch('/navbar').then(r => r.text());
            const foot = await fetch('/footer').then(r => r.text());
            document.getElementById('nav-placeholder').innerHTML = nav;
            document.getElementById('footer-placeholder').innerHTML = foot;
            
            // Re-init mobile menu
            const menu = document.getElementById('mobile-menu');
            const openBtn = document.getElementById('menu-open');
            const closeBtn = document.getElementById('menu-close');
            if (openBtn && closeBtn) {
                openBtn.onclick = () => menu.classList.remove('translate-x-full');
                closeBtn.onclick = () => menu.classList.add('translate-x-full');
            }
        };
        loadComponents();
    </script>
</body>
</html>
